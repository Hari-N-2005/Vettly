services:
  postgres:
    image: postgres:16-alpine
    container_name: vettly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vettly_db
      POSTGRES_USER: vettly
      POSTGRES_PASSWORD: vettly_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vettly -d vettly_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vettly-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    environment:
      DATABASE_URL: postgresql://vettly:vettly_password@postgres:5432/vettly_db
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: http://localhost
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
      - backend_reports:/app/reports

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: vettly-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
  backend_logs:
  backend_reports:
